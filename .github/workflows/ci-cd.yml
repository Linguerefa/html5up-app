name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ci-html-demo
  IMAGE_TAG: latest
  DOCKER_REGISTRY: docker.io

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            . --push

  scan_vulnerabilities:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0   # ne bloque pas le pipeline si HIGH est trouvé
          vuln-type: os,library
          ignore-unfixed: true
          cache-dir: .trivy-cache   # active le cache pour accélérer

  deploy:
    runs-on: self-hosted
    needs: scan_vulnerabilities
    steps:
      - name: Pull latest image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Stop existing container
        run: |
          docker stop $env:IMAGE_NAME -ErrorAction SilentlyContinue

      - name: Remove old container
        run: |
          docker rm $env:IMAGE_NAME -ErrorAction SilentlyContinue

      - name: Run new container
        run: |
          docker run -d `
            --name $env:IMAGE_NAME `
            -p 80:80 `
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
